<div class="objective-dialog">
  <h2 mat-dialog-title>{{ isEditMode ? 'Editar Objetivo' : 'Novo Objetivo' }}</h2>

  <mat-dialog-content>
    <form [formGroup]="objectiveForm">
      <div class="form-grid">
        <mat-form-field appearance="outline" class="form-field full-width">
          <mat-label>Título *</mat-label>
          <input matInput formControlName="title" placeholder="Digite o título do objetivo">
          <mat-error *ngIf="shouldShowError('title')">
            {{ getFieldError('title') }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field full-width">
          <mat-label>Descrição</mat-label>
          <textarea matInput formControlName="description" placeholder="Descreva o objetivo detalhadamente" rows="3"></textarea>
          <mat-error *ngIf="shouldShowError('description')">
            {{ getFieldError('description') }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Status *</mat-label>
          <mat-select formControlName="status">
            <mat-option value="ACTIVE">Ativo</mat-option>
            <mat-option value="COMPLETED">Concluído</mat-option>
            <mat-option value="CANCELLED">Cancelado</mat-option>
          </mat-select>
          <mat-error *ngIf="shouldShowError('status')">
            {{ getFieldError('status') }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Data Início *</mat-label>
          <input matInput [matDatepicker]="startDatePicker" formControlName="startDate">
          <mat-datepicker-toggle matSuffix [for]="startDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #startDatePicker></mat-datepicker>
          <mat-error *ngIf="shouldShowError('startDate')">
            {{ getFieldError('startDate') }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Data Meta</mat-label>
          <input matInput [matDatepicker]="targetDatePicker" formControlName="targetDate">
          <mat-datepicker-toggle matSuffix [for]="targetDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #targetDatePicker></mat-datepicker>
          <mat-error *ngIf="shouldShowError('targetDate')">
            {{ getFieldError('targetDate') }}
          </mat-error>
        </mat-form-field>
      </div>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()" [disabled]="isLoading">Cancelar</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="isLoading || objectiveForm.invalid">
      {{ isEditMode ? 'Atualizar' : 'Criar' }}
    </button>
  </mat-dialog-actions>
</div>
