<ds-page-form
  [cancelText]="'Cancelar'"
  [submitText]="submitButtonText"
  [loading]="isLoading"
  [disabled]="studentForm.invalid"
  (cancel)="onCancel()"
  (submit)="onSubmit()">
  
  <div class="form-header">
    <ds-page-header
      [showBackButton]="true"
      [backButtonText]="'Voltar para alunos'"
      [title]="pageTitle"
      subtitle="Cadastre um novo aluno para acompanhar sua evolução, frequência e objetivos."
      (backButtonClick)="onCancel()">
    </ds-page-header>
  </div>

  <div class="form-content">
    <ds-page-card [maxWidth]="'900px'" [padding]="'32px'">
      <form [formGroup]="studentForm">
        <div class="form-section">
          <h2 class="section-title">Dados Pessoais</h2>
          <div class="form-grid">
            <mat-form-field appearance="outline" class="form-field full-width">
              <mat-label>Nome Completo</mat-label>
              <input matInput formControlName="fullName" placeholder="Digite o nome completo">
              <mat-error *ngIf="studentForm.get('fullName')?.hasError('required')">
                Nome é obrigatório
              </mat-error>
              <mat-error *ngIf="studentForm.get('fullName')?.hasError('minlength')">
                Nome deve ter no mínimo 3 caracteres
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Telefone</mat-label>
              <input matInput formControlName="phone" placeholder="(00) 00000-0000">
              <mat-error *ngIf="studentForm.get('phone')?.hasError('required')">
                Telefone é obrigatório
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email" placeholder="email@exemplo.com">
              <mat-error *ngIf="studentForm.get('email')?.hasError('required')">
                Email é obrigatório
              </mat-error>
              <mat-error *ngIf="studentForm.get('email')?.hasError('email')">
                Email inválido
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Data de Nascimento</mat-label>
              <input matInput [matDatepicker]="picker" formControlName="birthDate">
              <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
              <mat-datepicker #picker></mat-datepicker>
              <mat-error *ngIf="studentForm.get('birthDate')?.hasError('required')">
                Data de nascimento é obrigatória
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Status</mat-label>
              <mat-select formControlName="active">
                <mat-option [value]="true">Ativo</mat-option>
                <mat-option [value]="false">Inativo</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>
      </form>
    </ds-page-card>
  </div>
</ds-page-form>
