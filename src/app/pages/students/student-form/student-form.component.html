<ds-page-form
  [cancelText]="'Cancelar'"
  [submitText]="submitButtonText"
  [loading]="isLoading"
  [disabled]="studentForm.invalid"
  (cancel)="onCancel()"
  (submit)="onSubmit()">
  <div class="form-header">
    <ds-page-header
      [showBackButton]="true"
      [backButtonText]="'Voltar para alunos'"
      [title]="pageTitle"
      subtitle="Cadastre um novo aluno para acompanhar sua evolução, frequência e objetivos."
      (backButtonClick)="onCancel()">
    </ds-page-header>
  </div>

  <div class="form-content">
    <ds-page-card [maxWidth]="'900px'" [padding]="'32px'">
      <form [formGroup]="studentForm">
        <div class="form-section">
          <h2 class="section-title">Dados Pessoais</h2>
          <div class="form-grid">
            <mat-form-field appearance="outline" class="form-field full-width">
              <mat-label>Nome Completo</mat-label>
              <input matInput formControlName="fullName" placeholder="Digite o nome completo">
              <mat-error *ngIf="shouldShowError('fullName')">
                {{ getFieldError('fullName') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Telefone</mat-label>
              <input matInput formControlName="phone" placeholder="(00) 00000-0000"
                     (input)="onPhoneInput($event)" maxlength="15" inputmode="numeric">
              <mat-error *ngIf="shouldShowError('phone')">
                {{ getFieldError('phone') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Email</mat-label>
              <input matInput formControlName="email" placeholder="email@exemplo.com" type="email" inputmode="email">
              <mat-error *ngIf="shouldShowError('email')">
                {{ getFieldError('email') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Data de Nascimento</mat-label>
              <input matInput formControlName="birthDate" placeholder="DD/MM/AAAA"
                     (input)="onDateInput($event)" maxlength="10">
              <mat-error *ngIf="shouldShowError('birthDate')">
                {{ getFieldError('birthDate') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Status</mat-label>
              <mat-select formControlName="active">
                <mat-option [value]="true">Ativo</mat-option>
                <mat-option [value]="false">Inativo</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>
      </form>
    </ds-page-card>
  </div>
</ds-page-form>
