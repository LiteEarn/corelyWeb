<div class="students-page">
  <ds-page-header
    title="Alunos"
    subtitle="Gerencie os alunos da instituição"
    [showActionButton]="true"
    actionButtonText="Novo Aluno"
    (actionButtonClick)="navigateToNew()">
  </ds-page-header>

  <mat-card class="filters-card">
    <mat-card-content class="filters-content">
      <div class="filters-section">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Buscar aluno</mat-label>
          <input matInput #searchInput (input)="onSearchChange(searchInput.value)" placeholder="Buscar aluno">
          <mat-icon matPrefix class="search-icon">search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="status-filter">
          <mat-label>Status</mat-label>
          <mat-select (selectionChange)="onStatusFilterChange($event.value)" [value]="statusFilter">
            <mat-option value="all">Todos</mat-option>
            <mat-option value="active">Ativos</mat-option>
            <mat-option value="inactive">Inativos</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content class="table-content">
      <table mat-table [dataSource]="dataSource" class="full-width-table">
        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let student">{{ student.fullName }}</td>
        </ng-container>

        <ng-container matColumnDef="phone">
          <th mat-header-cell *matHeaderCellDef>Telefone</th>
          <td mat-cell *matCellDef="let student">{{ student.phone }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let student">{{ student.email }}</td>
        </ng-container>

        <ng-container matColumnDef="active">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let student">
            <ds-status-chip [status]="student.active ? 'active' : 'inactive'" [label]="getActiveStatus(student.active)"></ds-status-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let student">
            <button mat-icon-button class="action-button" [routerLink]="['/students', student.id]">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button class="action-button" [routerLink]="['/students', student.id, 'edit']">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="filteredStudents.length === 0" class="empty-state-wrapper">
        <ds-empty-state
          icon="school"
          [title]="searchValue || statusFilter !== 'all' ? 'Nenhum aluno encontrado' : 'Nenhum aluno cadastrado'"
          [description]="searchValue || statusFilter !== 'all' ? 'Tente ajustar os filtros de busca.' : 'Comece cadastrando o primeiro aluno da instituição.'"
          [showAction]="!searchValue && statusFilter === 'all'"
          actionText="Cadastrar Primeiro Aluno"
          (actionClick)="navigateToNew()">
        </ds-empty-state>
      </div>
    </mat-card-content>
  </mat-card>
</div>
