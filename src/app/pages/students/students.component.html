<div class="students-page">
  <ds-page-header
    title="Alunos"
    subtitle="Gerencie os alunos da instituição"
    [showActionButton]="true"
    actionButtonText="Novo Aluno"
    (actionButtonClick)="navigateToNew()">
  </ds-page-header>

  <responsive-crud
    searchPlaceholder="Buscar aluno..."
    [searchValue]="searchValue"
    (searchChange)="onSearchChange($event)"
    [showNewButton]="true"
    newButtonText="Novo Aluno"
    (newClick)="navigateToNew()"
    [dataSource]="dataSource"
    [displayedColumns]="displayedColumns"
    [items]="filteredStudents"
    emptyIcon="school"
    emptyTitle="Nenhum aluno encontrado"
    emptyDescription="Cadastre o primeiro aluno para começar."
    [emptyShowAction]="!searchValue && statusFilter === 'all'"
    emptyActionText="Cadastrar Primeiro Aluno"
    (emptyActionClick)="navigateToNew()"
  >
    <mat-form-field appearance="outline" class="status-filter" crudFilters>
      <mat-label>Status</mat-label>
      <mat-select (selectionChange)="onStatusFilterChange($event.value)" [value]="statusFilter">
        <mat-option value="all">Todos</mat-option>
        <mat-option value="active">Ativos</mat-option>
        <mat-option value="inactive">Inativos</mat-option>
      </mat-select>
    </mat-form-field>

    <ng-container tableColumns>
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let student">{{ student.fullName }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Telefone</th>
        <td mat-cell *matCellDef="let student">{{ student.phone }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let student">{{ student.email }}</td>
      </ng-container>

      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let student">
          <ds-status-chip [status]="student.active ? 'active' : 'inactive'" [label]="getActiveStatus(student.active)"></ds-status-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let student">
          <crud-actions
            [actions]="crudActions"
            [item]="student"
            (actionClick)="onAction($event)"
          ></crud-actions>
        </td>
      </ng-container>
    </ng-container>

    <ng-template cardContent let-student>
      <mat-card class="crud-item-card" role="listitem" [attr.aria-label]="'Aluno: ' + student.fullName" tabindex="0">
        <mat-card-content>
          <div class="card-header">
            <h3 class="card-title">{{ student.fullName }}</h3>
            <ds-status-chip [status]="student.active ? 'active' : 'inactive'" [label]="getActiveStatus(student.active)"></ds-status-chip>
          </div>
          <div class="card-info">
            <div class="card-info-row" *ngIf="student.phone">
              <mat-icon class="card-info-icon">phone</mat-icon>
              <span>{{ student.phone }}</span>
            </div>
            <div class="card-info-row" *ngIf="student.email">
              <mat-icon class="card-info-icon">email</mat-icon>
              <span>{{ student.email }}</span>
            </div>
          </div>
        </mat-card-content>
        <mat-card-actions class="card-actions">
          <button mat-button color="primary" (click)="onAction({ action: 'view', item: student })" aria-label="Visualizar aluno">
            <mat-icon>visibility</mat-icon>
            Visualizar
          </button>
          <crud-actions
            [actions]="crudActions"
            [item]="student"
            (actionClick)="onAction($event)"
          ></crud-actions>
        </mat-card-actions>
      </mat-card>
    </ng-template>
  </responsive-crud>
</div>
