<div class="daily-agenda-page">
  <ds-page-header
    title="Agenda do Dia"
    subtitle="Visualize todas as aulas programadas para o dia."
  ></ds-page-header>

  <div class="agenda-content">
    <div class="date-header">
      <div class="date-info">
        <h2 class="date-day-name">{{ getDayName(selectedDate) }}</h2>
        <div class="date-row">
          <span class="date-full">{{ getFormattedDate(selectedDate) }}</span>
          <span *ngIf="isToday()" class="today-badge">Hoje</span>
        </div>
      </div>
      <span *ngIf="!loading && !error" class="session-count">
        {{ sessions.length }}
        {{ sessions.length === 1 ? 'sessão' : 'sessões' }}
      </span>
    </div>

    <app-loading *ngIf="loading"></app-loading>

    <div *ngIf="!loading && error" class="state-container">
      <ds-empty-state
        icon="error_outline"
        title="Erro ao carregar"
        [description]="error"
        [showAction]="true"
        actionText="Tentar novamente"
        actionIcon="refresh"
        (actionClick)="loadSessions()"
      ></ds-empty-state>
    </div>

    <div *ngIf="!loading && !error && sessions.length === 0" class="state-container">
      <ds-empty-state
        icon="event_busy"
        title="Nenhuma sessão encontrada"
        description="Não existem aulas programadas para esta data."
      ></ds-empty-state>
    </div>

    <div *ngIf="!loading && !error && sessions.length > 0" class="cards-list">
      <mat-card
        *ngFor="let session of sessions"
        class="session-card"
        [class.card-past]="isPast()"
      >
        <div class="card-main">
          <div class="card-time">
            <span class="time-value">{{ formatTime(session.startTime, session.endTime) }}</span>
          </div>

          <div class="card-info">
            <h3 class="card-title">{{ session.title }}</h3>
          </div>

          <div class="card-status">
            <ds-status-chip
              [status]="getStatusChip(session.status).status"
              [label]="getStatusChip(session.status).label"
            ></ds-status-chip>
          </div>
        </div>
      </mat-card>
    </div>
  </div>
</div>
