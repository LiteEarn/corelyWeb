<div class="instructors-page">
  <ds-page-header
    title="Instrutores"
    subtitle="Gerencie os instrutores da instituição"
    [showActionButton]="true"
    actionButtonText="Novo Instrutor"
    (actionButtonClick)="navigateToNew()">
  </ds-page-header>

  <responsive-crud-layout
    searchPlaceholder="Buscar instrutor..."
    [searchValue]="searchValue"
    (searchChange)="onSearchChange($event)"
    [showNewButton]="true"
    newButtonText="Novo Instrutor"
    (newClick)="navigateToNew()"
    [isLoading]="isLoading"
    [items]="filteredInstructors"
    emptyIcon="person"
    emptyTitle="Nenhum instrutor encontrado"
    emptyDescription="Cadastre o primeiro instrutor para começar."
    [emptyShowAction]="!searchValue && statusFilter === 'all'"
    emptyActionText="Cadastrar Primeiro Instrutor"
    (emptyActionClick)="navigateToNew()"
    [cardTemplate]="instructorCard"
  >
    <mat-form-field appearance="outline" class="status-filter" crudFilters>
      <mat-label>Status</mat-label>
      <mat-select (selectionChange)="onStatusFilterChange($event.value)" [value]="statusFilter">
        <mat-option value="all">Todos</mat-option>
        <mat-option value="active">Ativos</mat-option>
        <mat-option value="inactive">Inativos</mat-option>
      </mat-select>
    </mat-form-field>

    <table crudTable mat-table [dataSource]="dataSource" class="crud-table">
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let instructor">{{ instructor.fullName }}</td>
      </ng-container>

      <ng-container matColumnDef="specialty">
        <th mat-header-cell *matHeaderCellDef>Especialidade</th>
        <td mat-cell *matCellDef="let instructor">{{ instructor.specialty }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Telefone</th>
        <td mat-cell *matCellDef="let instructor">{{ instructor.phone }}</td>
      </ng-container>

      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let instructor">
          <ds-status-chip [status]="instructor.active ? 'active' : 'inactive'" [label]="getActiveStatus(instructor.active)"></ds-status-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let instructor">
          <crud-actions
            [actions]="crudActions"
            [item]="instructor"
            (actionClick)="onAction($event)"
          ></crud-actions>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <ng-template #instructorCard let-instructor>
      <mat-card class="crud-item-card" role="listitem" [attr.aria-label]="'Instrutor: ' + instructor.fullName" tabindex="0">
        <mat-card-content>
          <div class="card-header">
            <h3 class="card-title">{{ instructor.fullName }}</h3>
            <ds-status-chip [status]="instructor.active ? 'active' : 'inactive'" [label]="getActiveStatus(instructor.active)"></ds-status-chip>
          </div>
          <div class="card-info">
            <div class="card-info-row" *ngIf="instructor.specialty">
              <mat-icon class="card-info-icon">work</mat-icon>
              <span>{{ instructor.specialty }}</span>
            </div>
            <div class="card-info-row" *ngIf="instructor.phone">
              <mat-icon class="card-info-icon">phone</mat-icon>
              <span>{{ instructor.phone }}</span>
            </div>
            <div class="card-info-row" *ngIf="instructor.email">
              <mat-icon class="card-info-icon">email</mat-icon>
              <span>{{ instructor.email }}</span>
            </div>
          </div>
        </mat-card-content>
        <mat-card-actions class="card-actions">
          <button mat-button color="primary" (click)="onAction({ action: 'view', item: instructor })" aria-label="Visualizar instrutor">
            <mat-icon>visibility</mat-icon>
            Visualizar
          </button>
          <crud-actions
            [actions]="crudActions"
            [item]="instructor"
            (actionClick)="onAction($event)"
          ></crud-actions>
        </mat-card-actions>
      </mat-card>
    </ng-template>
  </responsive-crud-layout>
</div>
