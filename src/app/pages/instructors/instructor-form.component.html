<ds-page-form
  [cancelText]="'Cancelar'"
  [submitText]="isEditMode ? 'Atualizar' : 'Criar'"
  [loading]="loading"
  [disabled]="instructorForm.invalid"
  (cancel)="onCancel()"
  (submit)="onSubmit()">
  <div class="form-header">
    <ds-page-header
      [showBackButton]="true"
      [backButtonText]="'Voltar para instrutores'"
      [title]="pageTitle"
      [subtitle]="pageSubtitle"
      (backButtonClick)="onCancel()">
    </ds-page-header>
  </div>

  <div class="form-content">
    <ds-page-card [maxWidth]="'900px'" [padding]="'32px'">
      <form [formGroup]="instructorForm">
        <app-responsive-form-section title="Dados Pessoais">
          <app-responsive-form-grid>
            <mat-form-field appearance="outline" class="form-field full-width">
              <mat-label>Nome Completo</mat-label>
              <input matInput formControlName="fullName" placeholder="Digite o nome completo">
              <mat-error *ngIf="shouldShowError('fullName')">
                {{ getFieldError('fullName') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Telefone</mat-label>
              <input matInput formControlName="phone" placeholder="(XX) XXXXX-XXXX"
                     (input)="onPhoneInput($event)" maxlength="15">
              <mat-error *ngIf="shouldShowError('phone')">
                {{ getFieldError('phone') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Email</mat-label>
              <input matInput type="email" formControlName="email" placeholder="email@exemplo.com">
              <mat-error *ngIf="shouldShowError('email')">
                {{ getFieldError('email') }}
              </mat-error>
            </mat-form-field>
          </app-responsive-form-grid>
        </app-responsive-form-section>

        <app-responsive-form-section title="Informações Profissionais">
          <app-responsive-form-grid>
            <mat-form-field appearance="outline" class="form-field full-width">
              <mat-label>Especialidade</mat-label>
              <mat-select formControlName="specialty">
                <mat-option value="">Selecione a especialidade</mat-option>
                <mat-option *ngFor="let specialty of specialties" [value]="specialty">
                  {{ specialty }}
                </mat-option>
              </mat-select>
              <mat-error *ngIf="shouldShowError('specialty')">
                {{ getFieldError('specialty') }}
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Status</mat-label>
              <mat-select formControlName="active">
                <mat-option [value]="true">Ativo</mat-option>
                <mat-option [value]="false">Inativo</mat-option>
              </mat-select>
            </mat-form-field>
          </app-responsive-form-grid>
        </app-responsive-form-section>
      </form>
    </ds-page-card>
  </div>
</ds-page-form>
