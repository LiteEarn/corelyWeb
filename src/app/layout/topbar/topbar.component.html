<div class="topbar">
  <div class="topbar-left">
    <button mat-icon-button class="menu-button" (click)="toggleSidebar.emit()">
      <mat-icon>menu</mat-icon>
    </button>
    <h1 class="topbar-title">Corely</h1>
  </div>
  
  <div class="topbar-right">
    <div class="user-info">
      <mat-icon class="user-icon">account_circle</mat-icon>
      <span class="user-name">{{ userName }}</span>
    </div>
  </div>
</div>
