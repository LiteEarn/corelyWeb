<div class="topbar">
  <div class="topbar-left">
    <button mat-icon-button class="menu-button" (click)="toggleSidebar.emit()">
      <mat-icon>menu</mat-icon>
    </button>
    <h1 class="topbar-title">Corely</h1>
  </div>

  <div class="topbar-right">
    <div class="user-info"
         [matMenuTriggerFor]="userMenu"
         aria-haspopup="true"
         tabindex="0"
         role="button">
      <mat-icon class="user-icon">account_circle</mat-icon>
      <div class="user-details">
        <span class="user-name">{{ userName() }}</span>
        <span class="user-role">{{ userRole() }}</span>
      </div>
      <mat-icon class="user-dropdown-icon">arrow_drop_down</mat-icon>
    </div>

    <mat-menu #userMenu="matMenu" xPosition="before" class="user-menu-panel">
      <button mat-menu-item (click)="onNavigateProfile()">
        <mat-icon>person</mat-icon>
        <span>Meu Perfil</span>
      </button>
      <button mat-menu-item (click)="onChangePassword()">
        <mat-icon>lock</mat-icon>
        <span>Alterar Senha</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()" class="logout-item">
        <mat-icon color="warn">exit_to_app</mat-icon>
        <span class="logout-text">Sair</span>
      </button>
    </mat-menu>
  </div>
</div>
